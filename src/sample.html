<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back {
            background-color: #2196F3;
            color: white;
        }

        .btn-back:hover {
            background-color: #1976D2;
            transform: translateY(-2px);
        }

        .btn-delete-all {
            background-color: #f44336;
            color: white;
        }

        .btn-delete-all:hover {
            background-color: #d32f2f;
            transform: translateY(-2px);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .complaint-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid #6b0f0f;
        }

        .complaint-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            background-color: #6b0f0f;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            font-size: 1.2rem;
            margin: 0;
        }

        .card-date {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .card-body {
            padding: 20px;
        }

        .card-row {
            display: flex;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .card-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .card-label {
            font-weight: 600;
            color: #6b0f0f;
            min-width: 120px;
            flex-shrink: 0;
        }

        .card-value {
            color: #555;
            flex: 1;
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 10px;
        }

        .card-footer {
            padding: 15px 20px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .btn-view {
            background-color: #2196F3;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-view:hover {
            background-color: #1976D2;
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background-color: #d32f2f;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background-color: #6b0f0f;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .close-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-row {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .modal-label {
            font-weight: 600;
            color: #6b0f0f;
            min-width: 130px;
            flex-shrink: 0;
        }

        .modal-value {
            color: #555;
            flex: 1;
        }

        .modal-image {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 5px;
            margin-top: 15px;
        }

        .no-complaints {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .cards-container {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Complaints</h1>
        
        <div class="button-group">
            <button class="btn btn-back" onclick="goBack()">← Back</button>
            <button class="btn btn-delete-all" onclick="deleteAllComplaints()">Delete All Complaints</button>
        </div>

        <div class="cards-container" id="cardsContainer">
            <!-- Cards will be dynamically inserted here -->
        </div>

        <!-- Modal for viewing complaint details -->
        <div id="complaintModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalUsername">Username</h3>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Complaint details will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample complaint data
        let complaints = [
            {
                id: 1,
                username: "Abhishek",
                complaint: "ENTC dep, PC not working properly. Need immediate attention.",
                date: "2/21/2025",
                location: "college",
                subLocation: "ENTC",
                roomNumber: "318",
                image: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=300&fit=crop"
            },
            {
                id: 2,
                username: "Priya Sharma",
                complaint: "Projector in classroom not displaying properly",
                date: "2/20/2025",
                location: "college",
                subLocation: "CS",
                roomNumber: "205",
                image: "https://images.unsplash.com/photo-1517502884422-41eaead166d4?w=400&h=300&fit=crop"
            },
            {
                id: 3,
                username: "Rahul Verma",
                complaint: "Air conditioner not working in lab",
                date: "2/19/2025",
                location: "college",
                subLocation: "Mechanical",
                roomNumber: "401",
                image: "https://images.unsplash.com/photo-1581092921461-eab62e97a782?w=400&h=300&fit=crop"
            }
        ];

        // Function to render complaints as cards
        function renderComplaints() {
            const container = document.getElementById('cardsContainer');

            if (complaints.length === 0) {
                container.innerHTML = '<div class="no-complaints">No complaints found</div>';
                return;
            }

            container.innerHTML = complaints.map(complaint => `
                <div class="complaint-card" data-id="${complaint.id}">
                    <div class="card-header">
                        <h3>${complaint.username}</h3>
                        <span class="card-date">${complaint.date}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-row">
                            <span class="card-label">Complaint:</span>
                            <span class="card-value">${complaint.complaint.substring(0, 50)}${complaint.complaint.length > 50 ? '...' : ''}</span>
                        </div>
                        <div class="card-row">
                            <span class="card-label">Location:</span>
                            <span class="card-value">${complaint.location} - ${complaint.subLocation}</span>
                        </div>
                        <div class="card-row">
                            <span class="card-label">Room:</span>
                            <span class="card-value">${complaint.roomNumber}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn-view" onclick="viewComplaint(${complaint.id})">See Complaint</button>
                        <button class="btn-delete" onclick="deleteComplaint(${complaint.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Function to view complaint details in modal
        function viewComplaint(id) {
            const complaint = complaints.find(c => c.id === id);
            if (!complaint) return;

            document.getElementById('modalUsername').textContent = complaint.username;
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-row">
                    <span class="modal-label">Complaint ID:</span>
                    <span class="modal-value">${complaint.id}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Complaint:</span>
                    <span class="modal-value">${complaint.complaint}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Date:</span>
                    <span class="modal-value">${complaint.date}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Location:</span>
                    <span class="modal-value">${complaint.location}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Sub-Location:</span>
                    <span class="modal-value">${complaint.subLocation}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">Room Number:</span>
                    <span class="modal-value">${complaint.roomNumber}</span>
                </div>
                ${complaint.image ? `<img src="${complaint.image}" alt="Complaint Image" class="modal-image">` : ''}
            `;

            document.getElementById('complaintModal').style.display = 'block';
        }

        // Function to close modal
        function closeModal() {
            document.getElementById('complaintModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('complaintModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Function to delete a single complaint
        function deleteComplaint(id) {
            if (confirm('Are you sure you want to delete this complaint?')) {
                complaints = complaints.filter(c => c.id !== id);
                renderComplaints();
            }
        }

        // Function to delete all complaints
        function deleteAllComplaints() {
            if (complaints.length === 0) {
                alert('No complaints to delete');
                return;
            }
            
            if (confirm('Are you sure you want to delete all complaints?')) {
                complaints = [];
                renderComplaints();
            }
        }

        // Function to go back
        function goBack() {
            // You can change this to actual navigation
            alert('Going back...');
            // window.history.back();
        }

        // Initial render
        renderComplaints();
    </script>
</body>
</html>
